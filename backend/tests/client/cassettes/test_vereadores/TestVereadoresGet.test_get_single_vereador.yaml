        \ \"@type\": \"Vereador\",\n  \"biografia\": \"&lt;p&gt;O advogado e professor
        Abatenio de Andrade Marquez Neto, 49 anos, &amp;eacute; vereador do Progressistas
        em Uberl&amp;acirc;ndia-MG, em 2020 recebeu 2.133 votos assumindo o mandato
        em 2022 e reeleito em 2024 com 4.542 votos.&lt;/p&gt;\\r\\n&lt;p&gt;Formado
        em Direito pela Universidade Federal de Uberl&amp;acirc;ndia e mestre pela
        UEMG, possui ampla experi&amp;ecirc;ncia pol&amp;iacute;tica e administrativa.&lt;/p&gt;\\r\\n&lt;p&gt;Destaques
        de sua trajet&amp;oacute;ria:&lt;/p&gt;\\r\\n&lt;p&gt;Vice-prefeito de Ituiutaba
        (2005-2008).&lt;br /&gt;Superintendente do PROCON de Uberl&amp;acirc;ndia
        (2018-2019).&lt;br /&gt;Procurador-Geral do Munic&amp;iacute;pio de Uberl&amp;acirc;ndia
        (2019-2020).&lt;br /&gt;Secret&amp;aacute;rio de Agroneg&amp;oacute;cio, Economia
        e Inova&amp;ccedil;&amp;atilde;o.&lt;br /&gt;Assessor Especial do Prefeito
        Odelmo Le&amp;atilde;o (2021-2022).&lt;br /&gt;L&amp;iacute;der do Prefeito
        na C&amp;acirc;mara Municipal de Uberl&amp;acirc;ndia. (2022 - 2024)&lt;/p&gt;\\r\\n&lt;p&gt;Com
        s&amp;oacute;lida experi&amp;ecirc;ncia em gest&amp;atilde;o p&amp;uacute;blica
        e compromisso com causas sociais, Abatenio est&amp;aacute; preparado para
        assumir a responsabilidade como Secret&amp;aacute;rio de Direito do Consumidor
        e da Causa Animal, promovendo a&amp;ccedil;&amp;otilde;es efetivas e inovadoras
        em benef&amp;iacute;cio da popula&amp;ccedil;&amp;atilde;o.&lt;/p&gt;\",\n
